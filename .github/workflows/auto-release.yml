name: Auto Release

# Fires on every push to main. Inspects the new commits via Conventional Commits
# and, if any of them warrant a release, bumps pyproject.toml, commits the bump
# with [skip ci], and pushes a vX.Y.Z tag. The tag push triggers
# release-on-tag.yml, which builds and publishes artifacts.
#
# Bump rules:
#   feat:  / feat!: / BREAKING CHANGE   -> minor
#   fix:   / perf:                       -> patch
#   anything else (refactor:, chore:,    -> no release
#                  docs:, rfc:, test:,
#                  style:, ci:)
#
# Pre-1.0: BREAKING CHANGE bumps minor (no major bumps until 1.0.0).

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest

    # Recursion guard #1: skip the bump commit this workflow itself produced.
    # [skip ci] in the commit message is the primary defense; this is belt-and-suspenders
    # in case [skip ci] semantics change.
    if: |
      !(github.actor == 'github-actions[bot]'
        && startsWith(github.event.head_commit.message, 'chore: bump version to'))

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine bump kind from commits
        id: bump
        run: |
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          # Empty-push guard: force-push to same SHA, branch sync, etc.
          if [ "$BEFORE" = "$AFTER" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "Empty or initial push — nothing to inspect."
            echo "kind=none" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # First-line of every commit subject in the push.
          MESSAGES=$(git log --format='%s%n%b%n---' "$BEFORE..$AFTER")
          echo "Inspecting commits in $BEFORE..$AFTER"
          echo "$MESSAGES"

          KIND=none
          # Minor bump on feat / feat! / BREAKING CHANGE
          if echo "$MESSAGES" | grep -qE '^(feat(\([^)]+\))?!?: |BREAKING CHANGE:)'; then
            KIND=minor
          # Patch bump on fix / perf
          elif echo "$MESSAGES" | grep -qE '^(fix|perf)(\([^)]+\))?!?: '; then
            KIND=patch
          fi

          echo "Bump kind: $KIND"
          echo "kind=$KIND" >> "$GITHUB_OUTPUT"

      - name: Compute next version
        id: version
        if: steps.bump.outputs.kind != 'none'
        run: |
          CURRENT=$(grep '^version' pyproject.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "${{ steps.bump.outputs.kind }}" in
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEXT="$MAJOR.$MINOR.$PATCH"
          echo "Bumping $CURRENT -> $NEXT"
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "next=$NEXT"       >> "$GITHUB_OUTPUT"

      - name: Bump pyproject.toml, commit, tag, push
        if: steps.bump.outputs.kind != 'none'
        env:
          NEXT: ${{ steps.version.outputs.next }}
        run: |
          sed -i "s/^version = \".*\"/version = \"$NEXT\"/" pyproject.toml

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add pyproject.toml
          git commit -m "chore: bump version to $NEXT [skip ci]"
          git tag "v$NEXT" -m "Release v$NEXT"

          git push origin HEAD:main
          git push origin "v$NEXT"
