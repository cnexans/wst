name: Debug Chocolatey Push

# Temporary workflow to capture the chocolatey.org response body for our 403.
# `choco push` swallows the body and only echoes the status code, so we use
# curl directly. Triggered manually via `gh workflow run debug-choco.yml`.

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  test-push:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pack a unique test nupkg
        shell: pwsh
        run: |
          # Use a high version with a pre-release tag so it is clearly a debug
          # artifact and never collides with a real release.
          $version = "99.99.99-debug-$([int][double]::Parse((Get-Date -UFormat %s)))"
          Write-Host "Test version: $version"
          (Get-Content packaging/chocolatey/wst.nuspec) `
            -replace '<version>.*</version>', "<version>$version</version>" `
            | Set-Content packaging/chocolatey/wst.nuspec
          cd packaging/chocolatey
          choco pack
          Get-ChildItem *.nupkg | ForEach-Object { Write-Host "PACKED: $($_.Name) ($($_.Length) bytes)" }

      - name: Push variant A — multipart (-F)
        shell: pwsh
        env:
          CHOCO_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}
        run: |
          cd packaging/chocolatey
          $nupkg = Get-ChildItem *.nupkg | Select-Object -First 1
          Write-Host "Pushing: $($nupkg.FullName)  (multipart)"
          Write-Host "Key length (chars): $($env:CHOCO_KEY.Length)"
          curl.exe -v -X PUT `
            -H "X-NuGet-ApiKey: $env:CHOCO_KEY" `
            -F "package=@$($nupkg.FullName)" `
            --write-out "`n---HTTP_STATUS=%{http_code}---`n" `
            https://push.chocolatey.org/api/v2/package/
        continue-on-error: true

      - name: Push variant B — raw binary (--upload-file)
        shell: pwsh
        env:
          CHOCO_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}
        run: |
          cd packaging/chocolatey
          $nupkg = Get-ChildItem *.nupkg | Select-Object -First 1
          Write-Host "Pushing: $($nupkg.FullName)  (raw binary)"
          curl.exe -v -X PUT `
            -H "X-NuGet-ApiKey: $env:CHOCO_KEY" `
            -H "Content-Type: application/octet-stream" `
            --upload-file $nupkg.FullName `
            --write-out "`n---HTTP_STATUS=%{http_code}---`n" `
            https://push.chocolatey.org/api/v2/package/
        continue-on-error: true

      - name: Read sanity check — list our packages with the key
        shell: pwsh
        env:
          CHOCO_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}
        run: |
          # Single-quote the URL so PowerShell doesn't expand $filter as a var.
          # If the key is dead this also returns 403; if read works but push
          # doesn't, the key has read-only scope.
          $url = 'https://community.chocolatey.org/api/v2/Packages()?$filter=Id%20eq%20''wst'''
          Write-Host "URL: $url"
          curl.exe -v `
            -H "X-NuGet-ApiKey: $env:CHOCO_KEY" `
            -H "Accept: application/atom+xml" `
            --write-out "`n---HTTP_STATUS=%{http_code}---`n" `
            $url
        continue-on-error: true

      - name: ApiKey verify endpoint
        shell: pwsh
        env:
          CHOCO_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}
        run: |
          # NuGet protocol exposes /api/v2/verifykey/<id> for clients to
          # validate a key WITHOUT pushing. If chocolatey.org implements this
          # we get a clear "valid"/"invalid" answer.
          curl.exe -v `
            -H "X-NuGet-ApiKey: $env:CHOCO_KEY" `
            --write-out "`n---HTTP_STATUS=%{http_code}---`n" `
            'https://push.chocolatey.org/api/v2/verifykey/wst'
        continue-on-error: true
