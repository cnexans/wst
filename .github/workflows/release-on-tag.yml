# Push an annotated tag 'vX.Y.Z' (matching pyproject.toml) to trigger:
# tests, PyPI publish, .dmg build, optional Chocolatey push, and a GitHub
# Release with all artifacts attached. Tags are normally pushed by
# auto-release.yml; manual tag pushes work as an emergency-hotfix path.

name: Release on tag

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  prep:
    runs-on: ubuntu-latest
    outputs:
      semver: ${{ steps.meta.outputs.semver }}
    steps:
      - name: Strip v prefix for reusable workflow
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"
          SEMVER="${TAG#v}"
          echo "semver=$SEMVER" >> "$GITHUB_OUTPUT"

  publish:
    needs: prep
    uses: ./.github/workflows/release.yml
    with:
      version: ${{ needs.prep.outputs.semver }}
    secrets: inherit

  github-release:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: macos-dmg
          path: dmg/

      - name: Create GitHub release with artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/*.tar.gz
            dmg/*.dmg
