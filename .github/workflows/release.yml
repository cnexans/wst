name: Release

# Reusable build/publish pipeline called by release-on-tag.yml. Builds the
# Python wheel + sdist, the macOS .dmg (with PyInstaller CLI sidecar bundling
# numpy/sklearn/scipy), and pushes to PyPI + Chocolatey. Each job uploads
# its artifacts; release-on-tag.yml's github-release job collects and attaches.

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ inputs.version }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: ruff check src/ tests/
      - run: ruff format --check src/ tests/
      - run: pytest -v

  pypi:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ inputs.version }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/

  dmg:
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ inputs.version }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: dtolnay/rust-toolchain@stable

      - name: Build standalone wst CLI binary
        run: |
          python -m venv .venv
          .venv/bin/pip install -e . numpy scikit-learn scipy pyinstaller
          .venv/bin/pyinstaller --onefile --name wst \
            --collect-all wst \
            --collect-all numpy \
            --collect-all sklearn \
            --collect-all scipy \
            pyinstaller_entry.py
          mkdir -p app/src-tauri/binaries
          TRIPLE=$(rustc -vV | grep '^host:' | cut -d' ' -f2)
          cp dist/wst "app/src-tauri/binaries/wst-$TRIPLE"
          chmod +x "app/src-tauri/binaries/wst-$TRIPLE"

      - name: Build Tauri app
        run: cd app && npm ci && npx tauri build
        env:
          # Skip code-signing in CI; set APPLE_* secrets here for signed builds
          TAURI_SIGNING_PRIVATE_KEY: ""

      - name: Locate .dmg
        id: dmg
        run: |
          DMG=$(ls app/src-tauri/target/release/bundle/dmg/*.dmg | head -1)
          echo "path=$DMG" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: ${{ steps.dmg.outputs.path }}

  chocolatey:
    needs: test
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ inputs.version }}
      - name: Set version in nuspec
        shell: pwsh
        run: |
          $version = "${{ inputs.version }}"
          (Get-Content packaging/chocolatey/wst.nuspec) -replace '<version>.*</version>', "<version>$version</version>" | Set-Content packaging/chocolatey/wst.nuspec
      - name: Pack and push
        shell: pwsh
        run: |
          cd packaging/chocolatey
          choco pack
          choco push --source https://push.chocolatey.org/ --api-key ${{ secrets.CHOCOLATEY_API_KEY }} --verbose
