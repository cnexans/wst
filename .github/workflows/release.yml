name: Release

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: ruff check src/ tests/
      - run: pytest -v

  pypi:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.version && format('v{0}', inputs.version) || github.ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/

  dmg:
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.version && format('v{0}', inputs.version) || github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: dtolnay/rust-toolchain@stable

      - name: Build standalone wst CLI binary
        run: |
          python -m venv .venv
          .venv/bin/pip install -e . pyinstaller
          .venv/bin/pyinstaller --onefile --name wst --collect-all wst pyinstaller_entry.py
          mkdir -p app/src-tauri/binaries
          TRIPLE=$(rustc -vV | grep '^host:' | cut -d' ' -f2)
          cp dist/wst "app/src-tauri/binaries/wst-$TRIPLE"
          chmod +x "app/src-tauri/binaries/wst-$TRIPLE"

      - name: Build Tauri app
        run: cd app && npm ci && npx tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""

      - name: Locate .dmg
        id: dmg
        run: |
          DMG=$(ls app/src-tauri/target/release/bundle/dmg/*.dmg | head -1)
          echo "path=$DMG" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: ${{ steps.dmg.outputs.path }}

  chocolatey:
    needs: test
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.version && format('v{0}', inputs.version) || github.ref }}
      - name: Set version from tag
        shell: pwsh
        run: |
          $version = "${{ inputs.version || github.ref_name }}".TrimStart("v")
          (Get-Content packaging/chocolatey/wst.nuspec) -replace '<version>.*</version>', "<version>$version</version>" | Set-Content packaging/chocolatey/wst.nuspec
      - name: Pack and push
        shell: pwsh
        run: |
          cd packaging/chocolatey
          choco pack
          choco push --source https://push.chocolatey.org/ --api-key ${{ secrets.CHOCOLATEY_API_KEY }} --verbose
